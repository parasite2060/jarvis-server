# E2E Test Infrastructure
# Usage: docker compose -f docker-compose.e2e.yml up -d --wait
# Note: Uses different ports from local development to allow running simultaneously

name: service-template-e2e-test

services:
  postgres:
    # pgvector/pgvector:pg16 — Postgres 16 with the `pgvector` extension preinstalled.
    # Story 13.2 ships migration `0002-pgvector.ts` that runs `CREATE EXTENSION IF NOT EXISTS vector`;
    # production homelab Postgres has the extension (used by MemU). The e2e image must match.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: e2e_test_db
    ports:
      - 5433:5432 # E2E: 5433, Local: 5432
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
      # Init script — pre-creates the `jarvis` schema so the boilerplate's
      # `synchronize: true` (e2e env) can place schema-qualified entities
      # introduced in Story 13.2. Production uses migrations and creates the
      # schema explicitly in `0001-init-jarvis.ts`.
      - ./test/setup/postgres-init.sql:/docker-entrypoint-initdb.d/01-jarvis-schema.sql:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d e2e_test_db']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - 27018:27017 # E2E: 27018, Local: 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: test123
    volumes:
      - mongo_e2e_data:/data/db
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redpanda:
    image: redpandadata/redpanda:v24.3.15
    hostname: redpanda-e2e
    restart: unless-stopped
    ports:
      - 9093:9092 # E2E internal: 9093, Local: 9092
      - 9095:9094 # E2E external: 9095, Local: 9094
      - 9645:9644 # E2E admin: 9645, Local: 9644
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:9094
      - --advertise-kafka-addr internal://redpanda-e2e:9092,external://localhost:9095
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6380:6379 # E2E: 6380, Local: 6379
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Real Temporal cluster for e2e + integration tests.
  # Uses `temporalio/temporal` (the CLI image) running `server start-dev` —
  # the canonical zero-dependency dev mode that bundles an in-memory or
  # SQLite-backed cluster. The `default` namespace is auto-created.
  # Integration specs (Story 13.8 + 13.9 + 13.10+) connect to localhost:7234
  # instead of spawning the in-process Java Test Server, so the wire
  # contract (gRPC, signal delivery, worker registration, retry policies,
  # replay) gets exercised against a real server — not an embedded simulator.
  temporal:
    image: temporalio/temporal:1.7.0
    restart: unless-stopped
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --namespace
      - default
      - --log-level
      - warn
    ports:
      - 7234:7233 # gRPC frontend (E2E: 7234, Local dev compose: 7233)
      - 8234:8233 # Web UI (E2E: 8234, Local dev compose: 8233)
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'temporal', 'operator', 'namespace', 'describe', 'default', '--address', 'localhost:7233']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # MemU — semantic memory service used by IngestTranscriptUseCase and dream pipelines.
  # Uses the same GHCR image as production. Pointed at the e2e Postgres and the
  # local llama.cpp instance for embeddings. Port 8001 matches MEMU_API_URL in .env.e2e.
  memu-server:
    image: ghcr.io/parasite2060/memu-server:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - 8001:8000
    environment:
      - OPENAI_API_KEY=not-needed
      - OPENAI_BASE_URL=http://host.docker.internal:8080/v1
      - EMBEDDING_BASE_URL=http://host.docker.internal:8080/v1
      - EMBEDDING_MODEL=text-embedding-3-large
      - DEFAULT_LLM_MODEL=local
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=test123
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=e2e_test_db
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'python3', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/")']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_e2e_data:
  mongo_e2e_data:
