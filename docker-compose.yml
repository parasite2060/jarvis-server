services:
  jarvis-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jarvis-network
    volumes:
      - ai-memory:/app/ai-memory
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  memu-server:
    image: nevamindai/memu-server:latest
    ports:
      - "8010:8000"
    environment:
      - OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-changeme}
      - OPENAI_BASE_URL=${AZURE_OPENAI_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=text-embedding-3-large
      - CHAT_MODEL=gpt-5.2
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    volumes:
      - ./memu-main-override.py:/app/app/main.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis-local-dev
      POSTGRES_DB: jarvis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12_pgx
      - DB_PORT=5432
      - POSTGRES_USER=jarvis
      - POSTGRES_PWD=jarvis-local-dev
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    networks:
      - jarvis-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  jarvis-network:
    driver: bridge

volumes:
  pgdata:
  ai-memory:
