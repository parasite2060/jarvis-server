services:
  redpanda:
    image: redpandadata/redpanda:v24.3.15
    hostname: redpanda
    restart: unless-stopped
    ports:
      - 9092:9092
      - 9094:9094
      - 18082:18082
      - 9644:9644
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:9094
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:9094
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp
      - '1'
      - --memory
      - 1G
      - --mode
      - dev-container
      - --default-log-level=info
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redpanda-console:
    image: redpandadata/console:v2.8.6
    restart: unless-stopped
    ports:
      - 8082:8080
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-123456}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - 5432:5432
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Local Temporal cluster for development.
  # Use the homelab cluster (192.168.50.129:7233) for production-like work
  # OR localhost:7233 here for offline/disconnected sessions. Story 13.8+
  # `TemporalClientService` is lazy-on-first-use, so the worker doesn't
  # require Temporal at boot — but the dream pipeline (Story 13.10+)
  # needs it to actually run. Web UI exposed at http://localhost:8233.
  temporal:
    image: temporalio/temporal:1.7.0
    restart: unless-stopped
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --namespace
      - default
      - --log-level
      - info
    ports:
      - 7233:7233 # gRPC frontend
      - 8233:8233 # Web UI
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'temporal', 'operator', 'namespace', 'describe', 'default', '--address', 'localhost:7233']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
